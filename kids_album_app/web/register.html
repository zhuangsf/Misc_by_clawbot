<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>注册 - NeoAlbum</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00D9FF;
            --primary-dark: #0099CC;
            --primary-light: #66E5FF;
            --accent: #8B5CF6;
            --bg-dark: #0A0E17;
            --bg-card: #111827;
            --bg-elevated: #1F2937;
            --gradient-primary: linear-gradient(135deg, #00D9FF 0%, #8B5CF6 100%);
            --gradient-accent: linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%);
            --text-primary: #F9FAFB;
            --text-secondary: #9CA3AF;
            --text-muted: #6B7280;
            --border: rgba(0, 217, 255, 0.2);
            --glow: 0 0 20px rgba(0, 217, 255, 0.3);
        }

        body {
            font-family: 'Rajdhani', 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景 */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 217, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 217, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(0, 217, 255, 0.1) 0%, transparent 50%);
        }

        .register-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 520px;
            padding: 30px 20px 50px;
            margin: 0 auto;
        }

        /* 返回按钮 */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            color: var(--primary);
            transform: translateX(-5px);
        }

        /* Logo */
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 15px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid transparent;
            border-radius: 16px;
            border-top-color: var(--primary);
            border-right-color: var(--accent);
            animation: rotate 4s linear infinite;
        }

        .logo-ring:nth-child(2) {
            width: 85%;
            height: 85%;
            border-top-color: var(--accent);
            border-right-color: var(--primary);
            animation-duration: 3s;
            animation-direction: reverse;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .logo-icon {
            font-size: 22px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
        }

        /* 注册卡片 */
        .register-card {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 35px 30px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .register-title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 30px;
            color: var(--text-primary);
        }

        /* 头像上传 */
        .avatar-upload {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        .avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--bg-elevated);
            border: 2px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
            position: relative;
        }

        .avatar-preview:hover {
            border-color: var(--primary);
            box-shadow: var(--glow);
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-preview i {
            font-size: 32px;
            color: var(--text-muted);
        }

        .avatar-preview .upload-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 217, 255, 0.9);
            padding: 6px;
            font-size: 12px;
            color: var(--bg-dark);
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .avatar-preview:hover .upload-overlay {
            opacity: 1;
        }

        .avatar-hint {
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* 输入框组 */
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 42px;
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1), 0 0 20px rgba(0, 217, 255, 0.2);
        }

        .input-wrapper input:focus + i,
        .input-wrapper:focus-within i {
            color: var(--primary);
        }

        /* 密码强度 */
        .password-strength {
            margin-top: 8px;
            display: flex;
            gap: 4px;
        }

        .strength-bar {
            flex: 1;
            height: 4px;
            background: var(--bg-elevated);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .strength-bar.active.weak { background: #EF4444; }
        .strength-bar.active.medium { background: #F59E0B; }
        .strength-bar.active.strong { background: #10B981; }

        /* 服务条款 */
        .terms {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 25px;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .terms input {
            margin-top: 2px;
        }

        .terms a {
            color: var(--primary);
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        /* 注册按钮 */
        .register-btn {
            width: 100%;
            padding: 14px;
            background: var(--gradient-primary);
            border: none;
            border-radius: 10px;
            color: var(--bg-dark);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .register-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.4);
        }

        .register-btn:hover::before {
            left: 100%;
        }

        /* 登录链接 */
        .login-link {
            text-align: center;
            margin-top: 25px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            text-shadow: 0 0 10px var(--primary);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .register-container {
                padding: 20px 15px 40px;
            }

            .register-card {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-gradient"></div>

    <div class="register-container">
        <a href="login.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
            返回登录
        </a>

        <div class="logo-section">
            <div class="logo">
                <div class="logo-ring"></div>
                <div class="logo-ring"></div>
                <i class="fas fa-cube logo-icon"></i>
            </div>
            <h1 class="app-name">NeoAlbum</h1>
        </div>

        <div class="register-card">
            <h2 class="register-title">创建账号</h2>
            
            <form id="registerForm">
                <!-- 头像上传 -->
                <div class="avatar-upload">
                    <div class="avatar-preview" id="avatarPreview">
                        <i class="fas fa-camera"></i>
                        <div class="upload-overlay">更换头像</div>
                    </div>
                    <input type="file" id="avatarInput" accept="image/*" hidden>
                    <p class="avatar-hint">点击上传头像 (可选)</p>
                </div>

                <div class="input-group">
                    <label>用户名</label>
                    <div class="input-wrapper">
                        <input type="text" placeholder="设置用户名" required>
                        <i class="fas fa-user"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>邮箱地址</label>
                    <div class="input-wrapper">
                        <input type="email" placeholder="your@email.com" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>登录密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="passwordInput" placeholder="至少8位" required minlength="8">
                        <i class="fas fa-lock"></i>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strength1"></div>
                        <div class="strength-bar" id="strength2"></div>
                        <div class="strength-bar" id="strength3"></div>
                        <div class="strength-bar" id="strength4"></div>
                    </div>
                </div>

                <div class="input-group">
                    <label>确认密码</label>
                    <div class="input-wrapper">
                        <input type="password" placeholder="再次输入密码" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <div class="terms">
                    <input type="checkbox" id="termsCheck" required>
                    <label for="termsCheck">
                        我已阅读并同意 <a href="#">服务条款</a> 和 <a href="#">隐私政策</a>
                    </label>
                </div>

                <button type="submit" class="register-btn">
                    <span>立即注册</span>
                    <i class="fas fa-rocket" style="margin-left: 8px;"></i>
                </button>
            </form>

            <div class="login-link">
                已有账号?
                <a href="login.html">立即登录</a>
            </div>
        </div>
    </div>

    <script>
        // 头像上传预览
        const avatarInput = document.getElementById('avatarInput');
        const avatarPreview = document.getElementById('avatarPreview');
        
        avatarPreview.addEventListener('click', () => avatarInput.click());
        
        avatarInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    avatarPreview.innerHTML = `<img src="${e.target.result}" alt="头像">`;
                    avatarPreview.style.border = '2px solid var(--primary)';
                };
                reader.readAsDataURL(file);
            }
        });

        // 密码强度检测
        const passwordInput = document.getElementById('passwordInput');
        const strengthBars = [
            document.getElementById('strength1'),
            document.getElementById('strength2'),
            document.getElementById('strength3'),
            document.getElementById('strength4')
        ];

        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            strengthBars.forEach((bar, index) => {
                bar.className = 'strength-bar';
                if (index < strength) {
                    bar.classList.add('active');
                    if (strength <= 2) bar.classList.add('weak');
                    else if (strength <= 3) bar.classList.add('medium');
                    else bar.classList.add('strong');
                }
            });
        });

        // 表单提交
        const registerForm = document.getElementById('registerForm');
        
        registerForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = registerForm.querySelector('.register-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...';
            btn.disabled = true;
            
            setTimeout(() => {
                alert('注册成功！即将跳转到首页...');
                window.location.href = 'home.html';
            }, 1500);
        });
    </script>
</body>
</html>
