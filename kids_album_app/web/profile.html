<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的 - NeoAlbum</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00D9FF;
            --primary-dark: #0099CC;
            --primary-light: #66E5FF;
            --accent: #8B5CF6;
            --accent-pink: #EC4899;
            --bg-dark: #0A0E17;
            --bg-card: #111827;
            --bg-elevated: #1F2937;
            --gradient-primary: linear-gradient(135deg, #00D9FF 0%, #8B5CF6 100%);
            --gradient-accent: linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%);
            --text-primary: #F9FAFB;
            --text-secondary: #9CA3AF;
            --text-muted: #6B7280;
            --border: rgba(0, 217, 255, 0.15);
        }

        body {
            font-family: 'Rajdhani', 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* 背景 */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 217, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 217, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 50% 0%, rgba(0, 217, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(139, 92, 246, 0.1) 0%, transparent 40%);
            z-index: 0;
        }

        /* 顶部头部 */
        .profile-header {
            position: relative;
            z-index: 1;
            padding: 60px 20px 30px;
            background: linear-gradient(180deg, rgba(0, 217, 255, 0.1) 0%, transparent 100%);
        }

        .header-content {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        /* 头像 */
        .avatar-section {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.4);
            object-fit: cover;
        }

        .avatar-edit {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 36px;
            height: 36px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-dark);
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .avatar-edit:hover {
            transform: scale(1.1);
        }

        /* 用户信息 */
        .user-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-bio {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .user-tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .user-tag {
            padding: 6px 16px;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 12px;
            color: var(--primary);
        }

        /* 统计卡片 */
        .stats-section {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .stat-card {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
            transform: translateY(-3px);
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 功能列表 */
        .menu-section {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .menu-group {
            margin-bottom: 20px;
        }

        .menu-title {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            padding-left: 5px;
        }

        .menu-list {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background: rgba(0, 217, 255, 0.05);
        }

        .menu-item:hover .menu-icon {
            color: var(--primary);
        }

        .menu-icon {
            width: 40px;
            height: 40px;
            background: rgba(0, 217, 255, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 16px;
            margin-right: 15px;
            transition: all 0.3s ease;
        }

        .menu-item:hover .menu-icon {
            background: rgba(0, 217, 255, 0.2);
        }

        .menu-content {
            flex: 1;
        }

        .menu-label {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 3px;
        }

        .menu-desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        .menu-arrow {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* 徽章 */
        .badge-item {
            padding: 3px 10px;
            background: var(--gradient-accent);
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            color: white;
            margin-left: 8px;
        }

        /* 设置按钮 */
        .settings-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 600px;
            margin: 30px auto;
            padding: 16px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-secondary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .settings-btn:hover {
            background: rgba(0, 217, 255, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 10px 0;
            z-index: 100;
        }

        .bottom-nav-inner {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 20px;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .nav-item i {
            font-size: 20px;
        }

        .nav-item span {
            font-size: 11px;
        }

        .nav-item:hover,
        .nav-item.active {
            color: var(--primary);
        }

        .nav-item.active i {
            filter: drop-shadow(0 0 8px var(--primary));
        }

        /* 退出按钮 */
        .logout-btn {
            display: block;
            width: calc(100% - 40px);
            max-width: 560px;
            margin: 20px auto 100px;
            padding: 14px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            color: #EF4444;
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: #EF4444;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .user-name {
                font-size: 24px;
            }

            .avatar {
                width: 100px;
                height: 100px;
            }

            .stat-value {
                font-size: 22px;
            }

            .stats-grid {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-gradient"></div>

    <!-- 顶部头部 -->
    <header class="profile-header">
        <div class="header-content">
            <div class="avatar-section">
                <img src="https://picsum.photos/seed/avatar1/200/200" alt="头像" class="avatar">
                <div class="avatar-edit">
                    <i class="fas fa-camera"></i>
                </div>
            </div>
            <h1 class="user-name">NeoUser</h1>
            <p class="user-bio">
                科技爱好者 | 摄影爱好者<br>
                用镜头记录生活的美好瞬间 📸
            </p>
            <div class="user-tags">
                <span class="user-tag">#摄影师</span>
                <span class="user-tag">#旅行</span>
                <span class="user-tag">#极客</span>
            </div>
        </div>
    </header>

    <!-- 统计卡片 -->
    <section class="stats-section">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value">128</div>
                <div class="stat-label">相册</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">2,847</div>
                <div class="stat-label">照片</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">356</div>
                <div class="stat-label">收藏</div>
            </div>
        </div>
    </section>

    <!-- 功能列表 -->
    <section class="menu-section">
        <div class="menu-group">
            <div class="menu-title">内容管理</div>
            <div class="menu-list">
                <a href="home.html" class="menu-item">
                    <div class="menu-icon">
                        <i class="fas fa-images"></i>
                    </div>
                    <div class="menu-content">
                        <div class="menu-label">我的相册</div>
                        <div class="menu-desc">管理您的照片专辑</div>
                    </div>
                    <div class="menu-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>
                <a href="#" class="menu-item">
                    <div class="menu-icon">
                        <i class="fas fa-heart"></i>
                    </div>
                    <div class="menu-content">
                        <div class="menu-label">我的收藏 <span class="badge-item">NEW</span></div>
                        <div class="menu-desc">收藏的照片和专辑</div>
                    </div>
                    <div class="menu-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>
                <a href="#" class="menu-item">
                    <div class="menu-icon">
                        <i class="fas fa-history"></i>
                    </div>
                    <div class="menu-content">
                        <div class="menu-label">最近删除</div>
                        <div class="menu-desc">查看回收站</div>
                    </div>
                    <div class="menu-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>
            </div>
        </div>

        <div class="menu-group">
            <div class="menu-title">账户设置</div>
            <div class="menu-list">
                <a href="#" class="menu-item">
                    <div class="menu-icon">
                        <i class="fas fa-user-edit"></i>
                    </div>
                    <div class="menu-content">
                        <div class="menu-label">编辑资料</div>
                        <div class="menu-desc">修改头像、昵称、简介</div>
                    </div>
                    <div class="menu-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>
                <a href="#" class="menu-item">
                    <div class="menu-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <div class="menu-content">
                        <div class="menu-label">隐私设置</div>
                        <div class="menu-desc">控制您的可见性</div>
                    </div>
                    <div class="menu-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>
                <a href="#" class="menu-item">
                    <div class="menu-icon">
                        <i class="fas fa-bell"></i>
                    </div>
                    <div class="menu-content">
                        <div class="menu-label">通知设置</div>
                        <div class="menu-desc">管理推送通知</div>
                    </div>
                    <div class="menu-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>
                <a href="#" class="menu-item">
                    <div class="menu-icon">
                        <i class="fas fa-palette"></i>
                    </div>
                    <div class="menu-content">
                        <div class="menu-label">外观设置</div>
                        <div class="menu-desc">主题和显示选项</div>
                    </div>
                    <div class="menu-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>
            </div>
        </div>

        <div class="menu-group">
            <div class="menu-title">其他</div>
            <div class="menu-list">
                <a href="#" class="menu-item">
                    <div class="menu-icon">
                        <i class="fas fa-question-circle"></i>
                    </div>
                    <div class="menu-content">
                        <div class="menu-label">帮助与反馈</div>
                        <div class="menu-desc">获取帮助或提交建议</div>
                    </div>
                    <div class="menu-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>
                <a href="#" class="menu-item">
                    <div class="menu-icon">
                        <i class="fas fa-info-circle"></i>
                    </div>
                    <div class="menu-content">
                        <div class="menu-label">关于 NeoAlbum</div>
                        <div class="menu-desc">版本 1.0.0</div>
                    </div>
                    <div class="menu-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>
            </div>
        </div>
    </section>

    <!-- 退出登录 -->
    <button class="logout-btn">
        <i class="fas fa-sign-out-alt"></i> 退出登录
    </button>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <div class="bottom-nav-inner">
            <a href="home.html" class="nav-item">
                <i class="fas fa-images"></i>
                <span>相册</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-compass"></i>
                <span>发现</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-heart"></i>
                <span>收藏</span>
            </a>
            <a href="profile.html" class="nav-item active">
                <i class="fas fa-user"></i>
                <span>我的</span>
            </a>
        </div>
    </nav>

    <script>
        // 头像点击编辑
        document.querySelector('.avatar-edit').addEventListener('click', function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = e => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = e => {
                        document.querySelector('.avatar').src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        });

        // 退出登录确认
        document.querySelector('.logout-btn').addEventListener('click', function() {
            if (confirm('确定要退出登录吗？')) {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
