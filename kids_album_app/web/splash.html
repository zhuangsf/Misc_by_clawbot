<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeoAlbum - 启动页</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00D9FF;
            --primary-dark: #0099CC;
            --primary-light: #66E5FF;
            --accent: #8B5CF6;
            --bg-dark: #0A0E17;
            --bg-card: #111827;
            --bg-elevated: #1F2937;
            --gradient-primary: linear-gradient(135deg, #00D9FF 0%, #8B5CF6 100%);
            --text-primary: #F9FAFB;
            --text-secondary: #9CA3AF;
            --border: rgba(0, 217, 255, 0.2);
        }

        body {
            font-family: 'Rajdhani', 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 背景网格动画 */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 217, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 217, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* 背景渐变 */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 217, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
        }

        /* 浮动粒子 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.6;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Logo区域 */
        .logo-container {
            text-align: center;
            margin-bottom: 60px;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid transparent;
            border-radius: 30px;
            border-top-color: var(--primary);
            border-right-color: var(--accent);
            animation: rotate 3s linear infinite;
        }

        .logo-ring:nth-child(2) {
            width: 90%;
            height: 90%;
            border-top-color: var(--accent);
            border-right-color: var(--primary);
            animation-duration: 2s;
            animation-direction: reverse;
        }

        .logo-ring:nth-child(3) {
            width: 80%;
            height: 80%;
            border: 2px solid var(--primary);
            border-radius: 50%;
            opacity: 0.5;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .logo-icon {
            font-size: 48px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(0, 217, 255, 0.5));
        }

        .app-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            font-weight: 900;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            0% { filter: drop-shadow(0 0 10px rgba(0, 217, 255, 0.5)); }
            100% { filter: drop-shadow(0 0 30px rgba(139, 92, 246, 0.8)); }
        }

        .app-tagline {
            font-size: 14px;
            color: var(--text-secondary);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* 加载动画 */
        .loader {
            display: flex;
            gap: 8px;
            margin-top: 40px;
        }

        .loader-dot {
            width: 12px;
            height: 12px;
            background: var(--gradient-primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loader-dot:nth-child(1) { animation-delay: -0.32s; }
        .loader-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* 底部信息 */
        .footer-info {
            position: absolute;
            bottom: 40px;
            text-align: center;
        }

        .version {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .copyright {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* 跳转按钮 */
        .skip-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 25px;
            color: var(--text-secondary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .skip-btn:hover {
            background: rgba(0, 217, 255, 0.1);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
        }

        /* 响应式 */
        @media (max-width: 640px) {
            .app-name {
                font-size: 28px;
                letter-spacing: 4px;
            }
            
            .logo {
                width: 100px;
                height: 100px;
            }
            
            .logo-icon {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-gradient"></div>
    
    <div class="particles" id="particles"></div>
    
    <a href="login.html" class="skip-btn">跳过 <i class="fas fa-arrow-right"></i></a>
    
    <div class="container">
        <div class="logo-container">
            <div class="logo">
                <div class="logo-ring"></div>
                <div class="logo-ring"></div>
                <div class="logo-ring"></div>
                <i class="fas fa-cube logo-icon"></i>
            </div>
            <h1 class="app-name">NeoAlbum</h1>
            <p class="app-tagline">Future Photo Experience</p>
        </div>
        
        <div class="loader">
            <div class="loader-dot"></div>
            <div class="loader-dot"></div>
            <div class="loader-dot"></div>
        </div>
        
        <div class="footer-info">
            <p class="version">Version 1.0.0</p>
            <p class="copyright">© 2026 NeoAlbum. All rights reserved.</p>
        </div>
    </div>

    <script>
        // 生成粒子
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            
            // 随机颜色
            const colors = ['#00D9FF', '#8B5CF6', '#66E5FF', '#A78BFA'];
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            
            particlesContainer.appendChild(particle);
        }

        // 3秒后自动跳转
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 3000);
    </script>
</body>
</html>
