<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - NeoAlbum</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00D9FF;
            --primary-dark: #0099CC;
            --primary-light: #66E5FF;
            --accent: #8B5CF6;
            --bg-dark: #0A0E17;
            --bg-card: #111827;
            --bg-elevated: #1F2937;
            --gradient-primary: linear-gradient(135deg, #00D9FF 0%, #8B5CF6 100%);
            --text-primary: #F9FAFB;
            --text-secondary: #9CA3AF;
            --text-muted: #6B7280;
            --border: rgba(0, 217, 255, 0.2);
            --glow: 0 0 20px rgba(0, 217, 255, 0.3);
        }

        body {
            font-family: 'Rajdhani', 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 背景 */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 217, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 217, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(0, 217, 255, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(139, 92, 246, 0.12) 0%, transparent 50%);
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 40px;
            margin: 20px;
        }

        /* Logo */
        .logo-section {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid transparent;
            border-radius: 20px;
            border-top-color: var(--primary);
            border-right-color: var(--accent);
            animation: rotate 4s linear infinite;
        }

        .logo-ring:nth-child(2) {
            width: 85%;
            height: 85%;
            border-top-color: var(--accent);
            border-right-color: var(--primary);
            animation-duration: 3s;
            animation-direction: reverse;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .logo-icon {
            font-size: 28px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
        }

        /* 登录卡片 */
        .login-card {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 35px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .login-title {
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 35px;
            color: var(--text-primary);
        }

        /* 输入框组 */
        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.1), 0 0 20px rgba(0, 217, 255, 0.2);
        }

        .input-wrapper input:focus + i,
        .input-wrapper:focus-within i {
            color: var(--primary);
        }

        /* 记住我 & 忘记密码 */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .remember-me input {
            display: none;
        }

        .checkbox-custom {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .remember-me input:checked + .checkbox-custom {
            background: var(--gradient-primary);
            border-color: var(--primary);
        }

        .remember-me input:checked + .checkbox-custom::after {
            content: '✓';
            color: var(--bg-dark);
            font-size: 12px;
            font-weight: bold;
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .forgot-password:hover {
            text-shadow: 0 0 10px var(--primary);
        }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--gradient-primary);
            border: none;
            border-radius: 12px;
            color: var(--bg-dark);
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.4);
        }

        .login-btn:hover::before {
            left: 100%;
        }

        /* 分割线 */
        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: var(--text-muted);
            font-size: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            padding: 0 15px;
        }

        /* 社交登录 */
        .social-login {
            display: flex;
            gap: 15px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-btn:hover {
            border-color: var(--primary);
            background: rgba(0, 217, 255, 0.1);
            transform: translateY(-2px);
        }

        .social-btn.google:hover {
            border-color: #EA4335;
            background: rgba(234, 67, 53, 0.1);
        }

        .social-btn.apple:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }

        /* 注册链接 */
        .register-link {
            text-align: center;
            margin-top: 30px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .register-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
            transition: all 0.3s ease;
        }

        .register-link a:hover {
            text-shadow: 0 0 10px var(--primary);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-container {
                padding: 20px;
            }

            .login-card {
                padding: 30px 25px;
            }

            .app-name {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-gradient"></div>

    <div class="login-container">
        <div class="logo-section">
            <div class="logo">
                <div class="logo-ring"></div>
                <div class="logo-ring"></div>
                <i class="fas fa-cube logo-icon"></i>
            </div>
            <h1 class="app-name">NeoAlbum</h1>
        </div>

        <div class="login-card">
            <h2 class="login-title">欢迎回来</h2>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>邮箱地址</label>
                    <div class="input-wrapper">
                        <input type="email" placeholder="your@email.com" required>
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label>登录密码</label>
                    <div class="input-wrapper">
                        <input type="password" placeholder="••••••••" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span class="checkbox-custom"></span>
                        记住我
                    </label>
                    <a href="#" class="forgot-password">忘记密码?</a>
                </div>

                <button type="submit" class="login-btn">
                    <span>立即登录</span>
                    <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
                </button>
            </form>

            <div class="divider">
                <span>或</span>
            </div>

            <div class="social-login">
                <button class="social-btn google">
                    <i class="fab fa-google"></i>
                </button>
                <button class="social-btn apple">
                    <i class="fab fa-apple"></i>
                </button>
                <button class="social-btn">
                    <i class="fab fa-weixin"></i>
                </button>
            </div>

            <div class="register-link">
                还没有账号?
                <a href="register.html">立即注册</a>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 添加按钮加载状态
            const btn = loginForm.querySelector('.login-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';
            btn.disabled = true;
            
            // 模拟登录
            setTimeout(() => {
                // 登录成功，跳转到首页
                window.location.href = 'home.html';
            }, 1500);
        });
    </script>
</body>
</html>
