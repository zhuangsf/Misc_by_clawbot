<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>照片详情 - NeoAlbum</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00D9FF;
            --primary-dark: #0099CC;
            --primary-light: #66E5FF;
            --accent: #8B5CF6;
            --accent-pink: #EC4899;
            --bg-dark: #0A0E17;
            --bg-card: #111827;
            --bg-elevated: #1F2937;
            --gradient-primary: linear-gradient(135deg, #00D9FF 0%, #8B5CF6 100%);
            --text-primary: #F9FAFB;
            --text-secondary: #9CA3AF;
            --text-muted: #6B7280;
            --border: rgba(0, 217, 255, 0.2);
        }

        body {
            font-family: 'Rajdhani', 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 全屏图片查看器 */
        .photo-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        /* 顶部工具栏 */
        .viewer-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .viewer-header button {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 10px 15px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
        }

        .viewer-header button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .viewer-header .close-btn {
            padding: 10px;
            border-radius: 50%;
        }

        /* 图片容器 */
        .viewer-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .photo-container {
            max-width: 100%;
            max-height: 100%;
            position: relative;
        }

        .photo-container img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        /* 底部信息栏 */
        .viewer-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 20px 100px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            z-index: 10;
        }

        .photo-info {
            max-width: 800px;
            margin: 0 auto;
        }

        .photo-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .photo-title .badge {
            padding: 4px 12px;
            background: var(--gradient-primary);
            border-radius: 15px;
            font-size: 11px;
            font-weight: 600;
            color: var(--bg-dark);
        }

        .photo-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .meta-item i {
            color: var(--primary);
            font-size: 14px;
            width: 20px;
            text-align: center;
        }

        /* 标签 */
        .photo-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
        }

        .tag {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .tag:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* 操作按钮组 */
        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 100px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-btn:hover {
            background: rgba(0, 217, 255, 0.2);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .action-btn.primary {
            background: var(--gradient-primary);
            border-color: transparent;
            color: var(--bg-dark);
            font-weight: 600;
        }

        .action-btn.primary:hover {
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.4);
        }

        .action-btn.danger:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: #EF4444;
            color: #EF4444;
        }

        /* 图片切换指示器 */
        .photo-indicator {
            position: absolute;
            bottom: 280px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .indicator-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .indicator-dot.active {
            background: var(--primary);
            width: 24px;
            border-radius: 4px;
        }

        /* 导航箭头 */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: white;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 20;
        }

        .nav-arrow:hover {
            background: rgba(0, 217, 255, 0.3);
            border-color: var(--primary);
        }

        .nav-arrow.prev {
            left: 20px;
        }

        .nav-arrow.next {
            right: 20px;
        }

        /* 返回按钮 */
        .back-nav {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
        }

        .back-nav a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 25px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .back-nav a:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
        }

        /* 响应式 */
        @media (max-width: 640px) {
            .viewer-footer {
                padding: 20px 15px 90px;
            }

            .photo-title {
                font-size: 20px;
            }

            .photo-meta {
                gap: 12px;
            }

            .meta-item {
                font-size: 12px;
            }

            .action-buttons {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
            }

            .nav-arrow {
                width: 40px;
                height: 40px;
                font-size: 16px;
            }

            .nav-arrow.prev {
                left: 10px;
            }

            .nav-arrow.next {
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- 返回导航 -->
    <div class="back-nav">
        <a href="home.html">
            <i class="fas fa-arrow-left"></i>
            返回相册
        </a>
    </div>

    <!-- 全屏图片查看器 -->
    <div class="photo-viewer">
        <!-- 顶部工具栏 -->
        <div class="viewer-header">
            <div class="header-left">
                <button>
                    <i class="fas fa-info-circle"></i>
                    详情
                </button>
            </div>
            <div class="header-right">
                <button class="close-btn" onclick="window.location.href='home.html'">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>

        <!-- 导航箭头 -->
        <div class="nav-arrow prev" onclick="changePhoto(-1)">
            <i class="fas fa-chevron-left"></i>
        </div>
        <div class="nav-arrow next" onclick="changePhoto(1)">
            <i class="fas fa-chevron-right"></i>
        </div>

        <!-- 图片容器 -->
        <div class="viewer-body">
            <div class="photo-container">
                <img id="mainPhoto" src="https://picsum.photos/seed/city1/1200/800" alt="照片">
            </div>
        </div>

        <!-- 底部信息 -->
        <div class="viewer-footer">
            <div class="photo-info">
                <h1 class="photo-title">
                    城市夜景
                    <span class="badge">精选</span>
                </h1>
                
                <div class="photo-meta">
                    <div class="meta-item">
                        <i class="fas fa-calendar-alt"></i>
                        <span>2026年3月20日</span>
                    </div>
                    <div class="meta-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>上海 · 外滩</span>
                    </div>
                    <div class="meta-item">
                        <i class="fas fa-expand"></i>
                        <span>3840 × 2160</span>
                    </div>
                    <div class="meta-item">
                        <i class="fas fa-hard-drive"></i>
                        <span>4.2 MB</span>
                    </div>
                </div>

                <div class="photo-tags">
                    <span class="tag">#城市</span>
                    <span class="tag">#夜景</span>
                    <span class="tag">#灯光</span>
                    <span class="tag">#上海</span>
                    <span class="tag">#旅行</span>
                </div>

                <div class="action-buttons">
                    <button class="action-btn">
                        <i class="fas fa-heart"></i>
                        收藏
                    </button>
                    <button class="action-btn">
                        <i class="fas fa-star"></i>
                        设为封面
                    </button>
                    <button class="action-btn">
                        <i class="fas fa-share-alt"></i>
                        分享
                    </button>
                    <button class="action-btn danger">
                        <i class="fas fa-trash-alt"></i>
                        删除
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 照片数据
        const photos = [
            { id: 1, title: '城市夜景', location: '上海 · 外滩', date: '2026年3月20日', img: 'https://picsum.photos/seed/city1/1200/800' },
            { id: 2, title: '海边日落', location: '三亚 · 亚龙湾', date: '2026年3月19日', img: 'https://picsum.photos/seed/beach1/1200/800' },
            { id: 3, title: '咖啡时光', location: '北京 · 三里屯', date: '2026年3月18日', img: 'https://picsum.photos/seed/coffee1/1200/800' },
            { id: 4, title: 'Mountain View', location: '西藏 · 珠峰', date: '2026年3月17日', img: 'https://picsum.photos/seed/mountain1/1200/800' },
            { id: 5, title: '美食记录', location: '成都 · 宽窄巷子', date: '2026年3月16日', img: 'https://picsum.photos/seed/food1/1200/800' },
        ];

        let currentIndex = 0;

        // 更新照片显示
        function updatePhoto() {
            const photo = photos[currentIndex];
            const img = document.getElementById('mainPhoto');
            
            // 淡入效果
            img.style.opacity = '0';
            setTimeout(() => {
                img.src = photo.img;
                img.style.opacity = '1';
            }, 200);

            // 更新信息
            document.querySelector('.photo-title').innerHTML = `
                ${photo.title}
                <span class="badge">精选</span>
            `;
            document.querySelector('.meta-item:nth-child(1) span').textContent = photo.date;
            document.querySelector('.meta-item:nth-child(2) span').textContent = photo.location;
        }

        // 切换照片
        function changePhoto(direction) {
            currentIndex += direction;
            
            // 循环切换
            if (currentIndex < 0) currentIndex = photos.length - 1;
            if (currentIndex >= photos.length) currentIndex = 0;
            
            updatePhoto();
        }

        // 键盘导航
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') changePhoto(-1);
            if (e.key === 'ArrowRight') changePhoto(1);
            if (e.key === 'Escape') window.location.href = 'home.html';
        });

        // 触摸滑动支持
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) changePhoto(1);
                else changePhoto(-1);
            }
        }
    </script>
</body>
</html>
