<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 AI参数查看器 v0.1.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            min-height: 90vh;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        header::before {
            content: '🦞';
            font-size: 80px;
            position: absolute;
            top: 10px;
            right: 30px;
            opacity: 0.2;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 20px;
        }
        
        .nav-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            padding: 0 20px;
            overflow-x: auto;
            align-items: center;
        }
        
        .tab-button {
            padding: 15px 25px;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            color: #6c757d;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .tab-button:hover {
            color: #495057;
            background: #e9ecef;
        }
        
        .tab-button.active {
            color: #667eea;
            background: white;
        }
        
        .tab-button.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: #667eea;
        }
        
        .memory-selector {
            margin-left: auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        
        .memory-selector label {
            font-size: 0.9rem;
            color: #764ba2;
            font-weight: 500;
            white-space: nowrap;
        }
        
        .memory-dropdown {
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            background: white;
            color: #333;
            font-size: 0.9rem;
            min-width: 150px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .memory-dropdown:hover {
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
        }
        
        .memory-dropdown:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.2);
        }
        
        .content-area {
            padding: 30px;
            min-height: 500px;
        }
        
        .markdown-body {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #6c757d;
        }
        
        .loading::after {
            content: '🦞';
            display: block;
            font-size: 40px;
            margin-top: 20px;
            animation: pulse 1.5s infinite;
        }
        
        .error {
            background: #fff5f5;
            border-left: 4px solid #fc8181;
            padding: 20px;
            margin: 20px 0;
            color: #c53030;
        }
        
        .status-bar {
            background: #f8f9fa;
            padding: 10px 30px;
            border-top: 1px solid #e9ecef;
            color: #6c757d;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }
        
        .file-info {
            font-family: 'Courier New', monospace;
            background: #e9ecef;
            padding: 5px 10px;
            border-radius: 4px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @media (max-width: 768px) {
            .container {
                border-radius: 10px;
            }
            
            header {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .content-area {
                padding: 15px;
            }
            
            .nav-tabs {
                padding: 0 10px;
            }
            
            .tab-button {
                padding: 12px 15px;
                font-size: 0.9rem;
            }
        }
        
        /* 小龙虾特色样式 */
        .lobster-emoji {
            display: inline-block;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span class="lobster-emoji">🦞</span> AI参数查看器 v0.1.0</h1>
            <div class="subtitle">查看小龙虾的核心配置文件 · 极简设计 · 零配置使用</div>
        </header>
        
        <div class="nav-tabs" id="tabContainer">
            <!-- 配置文件标签按钮将通过JavaScript动态生成 -->
        </div>
        
        <div class="content-area">
            <div id="content" class="loading">
                正在加载文件列表...
            </div>
        </div>
        
        <div class="status-bar">
            <div id="status">就绪</div>
            <div id="filePath" class="file-info">当前文件: 无</div>
        </div>
    </div>

    <script>
        // 配置文件列表
        const configFiles = [
            { id: 'soul', name: 'SOUL.md', title: '灵魂文件 - 你是谁', path: '../../SOUL.md' },
            { id: 'user', name: 'USER.md', title: '用户文件 - 你帮助谁', path: '../../USER.md' },
            { id: 'agents', name: 'AGENTS.md', title: '代理文件 - 你的工作方式', path: '../../AGENTS.md' },
            { id: 'identity', name: 'IDENTITY.md', title: '身份文件 - 你的基本信息', path: '../../IDENTITY.md' },
            { id: 'tools', name: 'TOOLS.md', title: '工具文件 - 你的工具配置', path: '../../TOOLS.md' },
            { id: 'heartbeat', name: 'HEARTBEAT.md', title: '心跳文件 - 你的检查清单', path: '../../HEARTBEAT.md' }
        ];

        // 状态管理
        let currentFile = null;
        let allFilesList = []; // 存储当前所有文件列表
        
        // 获取记忆文件列表
        async function getMemoryFiles() {
            try {
                const response = await fetch('../../memory/');
                if (!response.ok) {
                    // 如果无法获取目录列表，使用已知的文件名
                    return [
                        { id: 'memory-today', name: '今日记忆', title: '今日记忆记录', path: '../../memory/2026-03-04.md', isMemory: true },
                        { id: 'memory-yesterday', name: '昨日记忆', title: '昨日记忆记录', path: '../../memory/2026-03-03.md', isMemory: true }
                    ];
                }
                
                const text = await response.text();
                // 简单解析目录列表（Apache目录列表）
                const files = [];
                const today = new Date().toISOString().split('T')[0].replace(/-/g, '-');
                
                // 提取.md文件
                const regex = /href="([^"]+\.md)"/g;
                let match;
                while ((match = regex.exec(text)) !== null) {
                    const filename = match[1];
                    if (filename.match(/^\d{4}-\d{2}-\d{2}\.md$/)) {
                        const date = filename.replace('.md', '');
                        files.push({
                            id: `memory-${date}`,
                            name: `记忆 ${date}`,
                            title: `记忆记录 ${date}`,
                            path: `../../memory/${filename}`,
                            isMemory: true
                        });
                    }
                }
                
                // 按日期倒序排序（最新的在前面）
                files.sort((a, b) => b.name.localeCompare(a.name));
                
                return files;
            } catch (error) {
                console.error('获取记忆文件列表失败:', error);
                return [];
            }
        }
        
        // 初始化函数
        async function init() {
            updateStatus('正在初始化...');
            
            // 获取记忆文件
            const memoryFiles = await getMemoryFiles();
            
            // 合并所有文件
            allFilesList = [...configFiles];
            if (memoryFiles.length > 0) {
                allFilesList.push({ id: 'memory-separator', name: '---', title: '分隔线', path: '', isSeparator: true });
                allFilesList.push(...memoryFiles);
            }
            
            createTabButtons(allFilesList);
            await loadFile(allFilesList[0]);
            updateStatus('就绪');
        }
        
        // 创建标签按钮
        function createTabButtons(files) {
            const tabContainer = document.getElementById('tabContainer');
            tabContainer.innerHTML = '';
            
            files.forEach(file => {
                if (file.isSeparator) {
                    // 添加分隔线
                    const separator = document.createElement('div');
                    separator.style.cssText = 'padding: 0 10px; color: #6c757d; font-weight: bold; display: flex; align-items: center;';
                    separator.innerHTML = '<span style="margin-right: 10px;">📝</span>记忆文件';
                    tabContainer.appendChild(separator);
                    return;
                }
                
                const button = document.createElement('button');
                button.className = 'tab-button';
                button.textContent = file.name;
                button.dataset.fileId = file.id;
                
                // 记忆文件添加特殊样式
                if (file.isMemory) {
                    button.style.color = '#764ba2';
                    button.innerHTML = `📅 ${file.name}`;
                }
                
                button.addEventListener('click', () => loadFile(file));
                tabContainer.appendChild(button);
            });
        }
        
        // 智能路径检测函数
        async function tryMultiplePaths(file) {
            const possiblePaths = [
                file.path,  // 原始路径
                `../${file.name}`,  // 上一级目录
                `./${file.name}`,   // 当前目录
                file.name,          // 直接文件名
                `../../${file.name}` // 上两级目录（当前设置）
            ];
            
            for (const path of possiblePaths) {
                try {
                    const response = await fetch(path);
                    if (response.ok) {
                        return { success: true, path: path, response: response };
                    }
                } catch (e) {
                    // 继续尝试下一个路径
                    continue;
                }
            }
            return { success: false, pathsTried: possiblePaths };
        }
        
        // 加载文件内容
        async function loadFile(file) {
            if (currentFile === file.id) return;
            
            // 更新标签状态
            updateTabActive(file.id);
            
            // 显示加载状态
            document.getElementById('content').innerHTML = '<div class="loading">正在查找 ' + file.name + '...</div>';
            updateStatus('正在查找 ' + file.name + '...');
            
            try {
                // 尝试多个可能的路径
                const result = await tryMultiplePaths(file);
                
                if (!result.success) {
                    throw new Error('无法找到文件，尝试了多个路径');
                }
                
                const markdown = await result.response.text();
                
                // 更新显示的路径
                document.getElementById('filePath').textContent = '当前文件: ' + result.path;
                
                // 渲染Markdown
                const html = marked.parse(markdown);
                
                // 构建标题和提示信息
                let headerContent = `<h2>${file.title}</h2>`;
                
                if (file.isMemory) {
                    headerContent = `
                        <div style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                            <h2 style="color: white; margin: 0;">${file.title}</h2>
                            <p style="margin: 10px 0 0 0; opacity: 0.9; font-size: 0.9rem;">
                                🧠 小龙虾的记忆文件 · 记录每日重要事件和决策
                            </p>
                        </div>
                    `;
                }
                
                document.getElementById('content').innerHTML = `
                    <div class="markdown-body">
                        ${headerContent}
                        <div style="background: #e3f2fd; padding: 8px 12px; border-radius: 4px; margin-bottom: 16px; font-size: 0.9rem; color: #1565c0;">
                            📍 文件路径: ${result.path}
                            ${file.isMemory ? ' · 🧠 记忆文件' : ''}
                        </div>
                        <hr>
                        ${html}
                    </div>
                `;
                
                currentFile = file.id;
                updateStatus('已加载 ' + file.name + ' (来自: ' + result.path + ')');
                
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <h3>❌ 加载失败</h3>
                        <p>${error.message}</p>
                        <p><small>尝试查找文件: ${file.name}</small></p>
                        <p><strong>可能的解决方案:</strong></p>
                        <ul style="margin-left: 20px; margin-top: 10px;">
                            <li>确保文件存在于服务器可访问的目录</li>
                            <li>检查HTTP服务器的工作目录</li>
                            <li>尝试在不同的目录中启动HTTP服务器</li>
                        </ul>
                        <button onclick="loadFile(${JSON.stringify(file)})" style="margin-top: 15px; padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer;">
                            重试加载
                        </button>
                    </div>
                `;
                updateStatus('加载失败: ' + error.message);
                document.getElementById('filePath').textContent = '当前文件: 查找失败';
            }
        }
        
        // 更新标签激活状态
        function updateTabActive(fileId) {
            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(button => {
                if (button.dataset.fileId === fileId) {
                    button.classList.add('active');
                } else {
                    button.classList.remove('active');
                }
            });
        }
        
        // 更新状态栏
        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
        
        // 添加键盘快捷键支持
        document.addEventListener('keydown', (event) => {
            if (event.ctrlKey || event.metaKey) {
                const index = parseInt(event.key) - 1;
                
                // 过滤掉分隔线
                const activeFiles = allFilesList.filter(f => !f.isSeparator);
                
                if (index >= 0 && index < activeFiles.length) {
                    event.preventDefault();
                    loadFile(activeFiles[index]);
                }
            }
        });
        
        // 添加文件拖放支持（未来功能）
        // 添加自动刷新功能（未来功能）
    </script>
</body>
</html>
